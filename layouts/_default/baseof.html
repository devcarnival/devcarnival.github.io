<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default `en-us` }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title | default .Site.Title }}</title>

    <!-- Primary Meta Tags (Search Engine Description) -->
    <meta name="title" content="{{ .Title | default .Site.Title }}">
    <meta name="description" content="{{ .Site.Params.description | default `Inspired by the spirit of a true carnival, DevCarnival is a two-day global tech festival in Chennai uniting industry, developers, and academia for purpose-oriented engineering.` }}">

    <!-- Open Graph / Facebook & WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:title" content="{{ .Title | default .Site.Title }}">
    <meta property="og:description" content="{{ .Site.Params.description | default `Inspired by the spirit of a true carnival, DevCarnival is a two-day global tech festival in Chennai uniting industry, developers, and academia.` }}">
    <meta property="og:image" content="{{ `whatsapp-thumbnail.png` | absURL }}">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Preview -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ .Permalink }}">
    <meta property="twitter:title" content="{{ .Title | default .Site.Title }}">
    <meta property="twitter:description" content="{{ .Site.Params.description | default `Inspired by the spirit of a true carnival, DevCarnival is a two-day global tech festival in Chennai uniting industry, developers, and academia.` }}">
    <meta property="twitter:image" content="{{ `whatsapp-thumbnail.png` | absURL }}">

    <!-- Favicon Links -->
    <link rel="icon" type="image/x-icon" href="{{ `favicon.ico` | relURL }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ `favicon-32x32.png` | relURL }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ `favicon-16x16.png` | relURL }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ `apple-touch-icon.png` | relURL }}">

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #111111;
            letter-spacing: -0.02em;
            padding-bottom: 80px; /* Prevents content from being hidden behind the fixed footer */
        }
        .text-gradient {
            background: linear-gradient(45deg, #ff6b6b, #feca57, #1dd1a1, #54a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-section {
            padding: 9rem 0 5rem 0;
        }
        .section-divider {
            border-top: 1px solid #eaeaea;
        }
        .nav-link {
            color: #555555;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .nav-link:hover {
            color: #111111;
        }
        .hero-logo {
            max-width: 280px;
            height: auto;
        }
        .btn-minimal {
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #111111;
            font-weight: 500;
            padding: 0.6rem 1.5rem;
            border-radius: 0px;
            transition: all 0.2s ease;
        }
        .btn-minimal:hover {
            background-color: transparent;
            color: #111111;
        }
        .btn-outline-minimal {
            background-color: transparent;
            color: #111111;
            border: 1px solid #111111;
            font-weight: 500;
            padding: 0.6rem 1.5rem;
            border-radius: 0px;
            transition: all 0.2s ease;
        }
        .btn-outline-minimal:hover {
            background-color: #111111;
            color: #ffffff;
        }
    </style>
</head>
<body>

    {{ partial "header.html" . }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
