<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Carnival | Festivals Around the World</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            height: 100vh;
            color: white;
        }
        .card-img-top {
            height: 220px;
            object-fit: cover;
        }
        .festival-card {
            transition: transform 0.3s ease;
        }
        .festival-card:hover {
            transform: translateY(-8px);
        }
        .bg-custom-dark {
            background-color: #111827;
        }
    </style>
</head>
<body data-bs-spy="scroll" data-bs-target="#navbar" data-bs-offset="70">

    <!-- Navigation -->
    <nav id="navbar" class="navbar navbar-expand-lg navbar-dark bg-custom-dark fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#"><i class="fa-solid fa-masks-theater me-2"></i>DevCarnival</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#carnivals">Carnivals</a></li>
                    <li class="nav-item"><a class="nav-link" href="#schedule">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header id="home" class="hero-section d-flex align-items-center justify-content-center text-center">
        <div class="container">
            <h1 class="display-3 fw-extrabold text-warning mb-3">Carnivals All Over The World</h1>
            <p class="lead fs-4 mb-4">Experience the rhythm, color, and soul of global traditions in one place.</p>
            <a href="#carnivals" class="btn btn-warning btn-lg fw-bold px-4 py-2 rounded-pill shadow">Explore Festivals</a>
        </div>
    </header>

    <!-- Footer -->
    <footer class="bg-custom-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-1">&copy; 2026 DevCarnival. All rights reserved.</p>
            <div class="social-icons mt-2">
                <a href="#" class="text-warning mx-2"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="text-warning mx-2"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="text-warning mx-2"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
